name: budzet_warsztatu
description: "Aplikacja do zarządzania budżetem warsztatu"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  intl: ^0.20.2

  # Baza danych
  drift: ^2.26.0
  drift_flutter: ^0.3.0
  sqlite3: ^3.3.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # Kamera i OCR
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.0
  image_picker: ^1.1.2
  permission_handler: ^12.0.3

  # Eksport
  pdf: ^3.11.3
  printing: ^5.14.2
  excel: ^4.0.6
  share_plus: ^13.2.0

  # Backup / chmura
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  http: ^1.3.2
  archive: ^3.6.1
  shared_preferences: ^2.3.5

  # Narzędzia
  uuid: ^4.5.1
  collection: ^1.19.1
  kalender: ^0.18.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
